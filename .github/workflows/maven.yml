name: Java CI with Coverage and Mutation Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Run normal tests + JaCoCo coverage
    - name: Run Tests & JaCoCo
      run: mvn -B clean test

    # 4. Run PITest (Mutation testing)
    - name: Run PITest
      run: mvn -B test-compile org.pitest:pitest-maven:mutationCoverage

    # 5. Save the JaCoCo report so you can download it
    - name: Upload JaCoCo Report
      uses: actions/upload-artifact@v4
      if: always() # This ensures it uploads even if a test fails
      with:
        name: jacoco-coverage-report
        path: target/site/jacoco/
        retention-days: 14

    # 6. Save the PITest report so you can download it
    - name: Upload PITest Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pitest-mutation-report
        path: target/pit-reports/
        retention-days: 14